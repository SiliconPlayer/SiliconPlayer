name: Android CI - optimizedDebug

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build optimizedDebug APK
    runs-on: ubuntu-latest
    env:
      JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF8
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/29.0.14206865

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK tools
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;36.1.0" \
            "ndk;29.0.14206865" \
            "cmake;3.22.1"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --licenses || true

      - name: Install native build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config cmake ninja-build perl
          sudo apt-get install -y xa65 || sudo apt-get install -y xa
          command -v xa

      - name: Configure git identity for patch application
        run: |
          git config --global user.name "Flopster101 CI"
          git config --global user.email "nahuelgomez329@gmail.com"

      - name: Add NDK gcc compatibility wrappers for OpenSSL configure
        run: |
          set -euo pipefail
          WRAPPER_DIR="/tmp/ndk-gcc-compat"
          mkdir -p "${WRAPPER_DIR}"

          cat > "${WRAPPER_DIR}/aarch64-linux-android-gcc" <<'EOF'
          #!/usr/bin/env bash
          exec "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang" "$@"
          EOF
          cat > "${WRAPPER_DIR}/arm-linux-androideabi-gcc" <<'EOF'
          #!/usr/bin/env bash
          exec "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi26-clang" "$@"
          EOF
          cat > "${WRAPPER_DIR}/x86_64-linux-android-gcc" <<'EOF'
          #!/usr/bin/env bash
          exec "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android26-clang" "$@"
          EOF
          cat > "${WRAPPER_DIR}/i686-linux-android-gcc" <<'EOF'
          #!/usr/bin/env bash
          exec "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/i686-linux-android26-clang" "$@"
          EOF

          chmod +x "${WRAPPER_DIR}"/*-linux-android-gcc
          echo "${WRAPPER_DIR}" >> "${GITHUB_PATH}"

      - name: Verify debug signing key
        run: test -f debug.keystore

      - name: Compute native deps cache key
        id: deps-cache-key
        shell: bash
        run: |
          set -euo pipefail
          EXTERNAL_TREE_HASH="$(git rev-parse HEAD:external)"
          echo "key=native-deps-${{ runner.os }}-ndk29-api21-all_legacy-${EXTERNAL_TREE_HASH}" >> "${GITHUB_OUTPUT}"

      - name: Restore native deps cache
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: app/src/main/cpp/prebuilt
          key: ${{ steps.deps-cache-key.outputs.key }}

      - name: Build native dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: |
          chmod +x external/build_deps.sh
          ./external/build_deps.sh all_legacy all

      - name: Build optimizedDebug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleOptimizedDebug -PenableX86=true --no-daemon --stacktrace

      - name: Get short commit hash
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Get app version
        id: version
        run: |
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "version_name=${VERSION_NAME}-optdebug" >> "$GITHUB_OUTPUT"

      - name: Prepare artifacts
        run: |
          mkdir -p artifact
          find app/build/outputs -type f -name "*.apk" | grep -i optimizeddebug | while read -r APK; do
            ABI=$(basename "$APK" | sed -n 's/.*app-\(.*\)-optimizedDebug\.apk/\1/p')
            cp "$APK" "artifact/SiliconPlayer-${{ steps.version.outputs.version_name }}-${{ steps.vars.outputs.short_sha }}-$ABI.apk"
          done
          ls -la artifact/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SiliconPlayer-${{ steps.version.outputs.version_name }}-${{ steps.vars.outputs.short_sha }}
          path: artifact/*.apk
